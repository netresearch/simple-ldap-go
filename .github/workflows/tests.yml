# Integration, benchmark, coverage and matrix tests that the canonical
# netresearch/.github/.github/workflows/go-check.yml reusable does not cover:
#   - Go version matrix (1.25 / 1.26)
#   - LDAP testcontainer integration tests
#   - Benchmark suite on main
#   - Combined unit + integration coverage report
#   - Full cross-platform matrix on tags
#
# Basic build + vet + `go test -race -short` on the head Go version runs
# inside ci.yml (go-check reusable). This workflow layers on top of that.
name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO111MODULE: on
  CGO_ENABLED: 1 # Required for race detection
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Fast unit tests on every commit, across supported Go versions.
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run fast unit tests
        run: make test-fast
        timeout-minutes: 5

      - name: Upload unit test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: unit-test-results-${{ matrix.go-version }}
          path: |
            coverage-unit.out
            test-results.xml

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: matrix.go-version == '1.26'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-unit.out
          flags: unit
          name: unit-tests
          disable_search: true
          network_prefix: github.com/netresearch/simple-ldap-go/

  # Integration tests with optimised Docker testcontainer management.
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Start Docker services
        run: |
          sudo systemctl start docker
          docker info

      - name: Run optimized integration tests
        run: make test-integration-parallel
        timeout-minutes: 10
        env:
          CI: "true"

      - name: Upload integration test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: integration-test-results-${{ matrix.go-version }}
          path: |
            coverage-integration.out
            test-results.xml

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        if: matrix.go-version == '1.26'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.out
          flags: integration
          name: integration-tests
          disable_search: true
          network_prefix: github.com/netresearch/simple-ldap-go/

  # Benchmark suite on main-branch pushes.
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run benchmark tests
        run: make test-benchmark-ci
        timeout-minutes: 2

      - name: Upload benchmark results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: |
            benchmark-results.txt
            cpu.prof
            mem.prof

  # Combined coverage report (unit + integration), uploaded as artifact.
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Download unit coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: unit-test-results-1.26
          path: coverage-unit

      - name: Download integration coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: integration-test-results-1.26
          path: coverage-integration

      - name: Merge coverage profiles
        run: |
          head -1 coverage-unit/coverage-unit.out > coverage.out
          tail -n +2 coverage-unit/coverage-unit.out >> coverage.out
          tail -n +2 coverage-integration/coverage-integration.out >> coverage.out
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out | tail -1
          echo "Combined coverage report generated"

      - name: Upload coverage results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html

  # Cross-platform matrix on tag pushes.
  full-test-suite:
    name: Full Test Suite
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run comprehensive test suite
        run: make test-comprehensive
        timeout-minutes: 15

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: full-test-results-${{ matrix.os }}-go${{ matrix.go-version }}
          path: |
            coverage.out
            test-results.xml
