name: SLSA Provenance

on:
  release:
    types: [published]

permissions: read-all

jobs:
  # First job: Prepare subjects for provenance
  prepare:
    name: Prepare Provenance Subjects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      subjects: ${{ steps.subjects.outputs.subjects }}
      has_subjects: ${{ steps.subjects.outputs.has_subjects }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p release-assets
          gh release download "$RELEASE_TAG" -D release-assets || true
          ls -la release-assets/

      - name: Generate provenance subjects
        id: subjects
        run: |
          cd release-assets
          # Generate SHA256 for all release assets
          if ls * 1> /dev/null 2>&1; then
            sha256sum * > ../provenance-subjects.txt
            cat ../provenance-subjects.txt

            # Base64 encode sha256sum output for SLSA reusable workflow
            SUBJECTS_BASE64=$(cat ../provenance-subjects.txt | base64 -w0)
            echo "subjects=$SUBJECTS_BASE64" >> "$GITHUB_OUTPUT"
            echo "has_subjects=true" >> "$GITHUB_OUTPUT"
          else
            echo "No assets to hash"
            echo "has_subjects=false" >> "$GITHUB_OUTPUT"
          fi

  # Second job: Generate SLSA provenance using reusable workflow
  # Note: SLSA reusable workflows are pinned to version tags per project recommendation
  # See: https://github.com/slsa-framework/slsa-github-generator#referencing-slsa-builders-and-generators
  provenance:
    name: Generate SLSA Provenance
    needs: prepare
    if: needs.prepare.outputs.has_subjects == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.prepare.outputs.subjects }}
      upload-assets: true

  # Third job: Generate source attestation
  source-attestation:
    name: Generate Source Attestation
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write
    env:
      COMMIT_SHA: ${{ github.sha }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
      REF: ${{ github.ref }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate source provenance attestation
        run: |
          # Create source attestation using environment variables
          cat > source-provenance.json << EOF
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "predicateType": "https://slsa.dev/provenance/v0.2",
            "subject": [
              {
                "name": "github.com/netresearch/simple-ldap-go",
                "digest": {
                  "sha1": "$COMMIT_SHA"
                }
              }
            ],
            "predicate": {
              "builder": {
                "id": "https://github.com/$REPO/actions/runs/$RUN_ID"
              },
              "buildType": "https://github.com/slsa-framework/slsa-github-generator/go@v1",
              "invocation": {
                "configSource": {
                  "uri": "git+https://github.com/$REPO@$REF",
                  "digest": {
                    "sha1": "$COMMIT_SHA"
                  },
                  "entryPoint": ".github/workflows/slsa-provenance.yml"
                }
              },
              "metadata": {
                "buildInvocationID": "$RUN_ID",
                "completeness": {
                  "parameters": true,
                  "environment": true,
                  "materials": true
                },
                "reproducible": false
              },
              "materials": [
                {
                  "uri": "git+https://github.com/$REPO@$REF",
                  "digest": {
                    "sha1": "$COMMIT_SHA"
                  }
                }
              ]
            }
          }
          EOF
          cat source-provenance.json

      - name: Upload source provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" source-provenance.json --clobber || true
