name: CI

on:
  push:
    branches: [main]
    tags: ["**"]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  # Canonical Go pipeline: build + vet + test + golangci-lint + govulncheck + gosec.
  go-check:
    uses: netresearch/.github/.github/workflows/go-check.yml@main
    permissions:
      contents: read
      security-events: write
    with:
      go-version-file: go.mod
      # Unit-only in the shared reusable; integration/benchmarks run in optimized-tests.yml.
      test-flags: "-race -short -coverprofile=coverage.out -covermode=atomic"
      enable-codecov: false
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Workflow-file linter (actionlint) via org reusable.
  lint-workflows:
    uses: netresearch/.github/.github/workflows/lint-workflows.yml@main
    permissions:
      contents: read

  # Markdown linter via org reusable.
  lint-markdown:
    uses: netresearch/.github/.github/workflows/lint-markdown.yml@main
    permissions:
      contents: read

  # YAML linter via org reusable.
  lint-yaml:
    uses: netresearch/.github/.github/workflows/lint-yaml.yml@main
    permissions:
      contents: read

  # Secret scanning via the org reusable.
  gitleaks:
    uses: netresearch/.github/.github/workflows/gitleaks.yml@main
    permissions:
      contents: read
      security-events: write
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Filesystem vulnerability scan. No org reusable yet, kept inline with pinned SHAs.
  trivy:
    name: trivy scan (fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif

  # License compliance check. No org reusable yet, kept inline.
  license-check:
    name: license compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@v1.6.0

      - name: Check license compliance
        run: |
          echo "Checking license compliance..."
          "$(go env GOPATH)"/bin/go-licenses check ./... 2>&1 | tee license-report.txt || true

          # Fail on copyleft licenses that require source disclosure
          if grep -iE "(GPL|AGPL|LGPL|SSPL|CDDL|EPL|MPL)" license-report.txt | grep -v "Apache\|MIT\|BSD\|ISC"; then
            echo "::error::Copyleft license detected - review required"
            exit 1
          fi
          echo "License check passed - no problematic licenses detected"
