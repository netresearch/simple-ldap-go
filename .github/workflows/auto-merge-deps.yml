# Auto-merge dependency updates (Dependabot / Renovate).
# Delegates to the canonical org-wide reusable in netresearch/.github.
name: Auto-merge dependency PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  auto-merge:
    uses: netresearch/.github/.github/workflows/auto-merge-deps.yml@main
    permissions:
      contents: write
      pull-requests: write
