name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  analysis:
    uses: netresearch/.github/.github/workflows/scorecard.yml@main
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
