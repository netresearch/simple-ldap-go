codecov:
  require_ci_to_pass: true
  notify:
    after_n_builds: 2

ignore:
  - "examples/**"
  - "testutil/**"
  - "docs/**"
  - "test_setup.go"
  - "test_setup_stub.go"
  - "test_runner_stub.go"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 100%

flags:
  unit:
    paths:
      - "**/*.go"
    carryforward: true
  integration:
    paths:
      - "**/*.go"
    carryforward: true

component_management:
  individual_components:
    - component_id: core
      name: Core Library
      paths:
        - client.go
        - users.go
        - groups.go
        - computers.go
        - auth.go
        - generics.go
        - iterators.go
        - options.go
        - shared_search.go
    - component_id: security
      name: Security
      paths:
        - security.go
        - validation.go
    - component_id: performance
      name: Performance
      paths:
        - cache.go
        - cache_generic.go
        - cache_indexed.go
        - pool.go
        - concurrency.go
        - resilience.go
        - performance.go
    - component_id: builders
      name: Query Builders
      paths:
        - builders.go
    - component_id: errors
      name: Error Handling
      paths:
        - errors.go
        - error_helpers.go
    - component_id: utils
      name: Utilities
      paths:
        - utils.go
        - uac.go
        - object.go
        - sam_account_type.go
